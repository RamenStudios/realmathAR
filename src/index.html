  import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

  window.CE = {...CE};
  window.THREE = { ...THREE };
  window.THREE.GLTFLoader = GLTFLoader;
  window.THREE.ParametricGeometry = ParametricGeometry;
  window.THREE.LineGeometry = LineGeometry;
  window.THREE.LineMaterial = LineMaterial;
  window.THREE.Line2 = Line2;
  window.THREE.CSS2DRenderer = CSS2DRenderer;
  window.THREE.CSS2DObject = CSS2DObject;
</script>
